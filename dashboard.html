
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>귤귤 | 회원 대시보드</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <header id="siteHeader" class="site-header"></header>
  <main>
    <section class="page-hero">
      <div class="container layout">
        <aside class="sidebar">
          <div class="menu-card stack">
            <div>
              <div class="muted">로그인 계정</div>
              <div style="font-weight:700;font-size:20px;letter-spacing:-.04em" id="profileName">-</div>
              <div class="muted" id="profileEmail">-</div>
            </div>
            <span class="pill orange" id="profileRole">-</span>
            <div class="row">
              <span class="badge badge-outline" id="modeBadge">모드 확인 중</span>
              <button class="btn btn-ghost small" data-action="logout" type="button">로그아웃</button>
            </div>
            <div id="adminLinkWrap" class="hidden"></div>
          </div>
          <div class="stats-card">
            <div class="k">MY COURSES</div>
            <div class="v" id="statCourses">0</div>
          </div>
          <div class="stats-card">
            <div class="k">EVENTS</div>
            <div class="v" id="statEvents">0</div>
          </div>
          <div class="stats-card">
            <div class="k">ASSIGNMENTS</div>
            <div class="v" id="statAssignments">0</div>
          </div>
          <div class="stats-card">
            <div class="k">SCHEDULES</div>
            <div class="v" id="statSchedules">0</div>
          </div>
        </aside>
        <div class="main">
          <div id="statusBar" class="status-bar">내 강의 정보를 불러오는 중입니다.</div>
          <div class="card"><div id="courseTabs" class="course-tabs"></div></div>
          <div id="courseHero" class="card"></div>
          <div class="calendar-shell">
            <div class="calendar-head">
              <div>
                <span class="eyebrow">COURSE CALENDAR</span>
                <h2 class="section-title" style="margin:8px 0 0;font-size:28px" id="calendarTitle">-</h2>
              </div>
              <div class="row">
                <button class="btn btn-ghost small" data-cal="prev" type="button">이전 달</button>
                <button class="btn btn-ghost small" data-cal="next" type="button">다음 달</button>
              </div>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
          </div>
          <section class="stack">
            <div class="row" style="justify-content:space-between;align-items:end"><div><span class="eyebrow">EVENTS</span><h2 class="section-title" style="margin-bottom:0">행사 상태별 보기</h2></div></div>
            <div id="eventColumns" class="event-columns"></div>
          </section>
          <section class="grid-2">
            <div class="card"><div class="card-header"><h3>강의 일정</h3><span class="pill orange">캘린더 연동</span></div><div id="scheduleList" class="stack"></div></div>
            <div class="card"><div class="card-header"><h3>n주차 과제</h3><span class="pill orange">과제 보드</span></div><div id="assignmentList" class="assignment-list"></div></div>
          </section>
        </div>
      </div>
    </section>
  </main>
  <footer id="siteFooter"></footer>
  <script type="module" src="./assets/js/pages/dashboard-page.js"></script>
</body>
</html>
