<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>귤귤 일정관리</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="dashboard.html"><span class="brand-mark"></span><span class="brand-text" data-site-name>귤귤 일정관리</span></a>
      <div class="nav-actions">
        <span class="pill orange" id="member-name"></span>
        <button class="btn btn-secondary small" id="signout-btn" type="button">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container layout">
      <aside class="sidebar">
        <section class="menu-card">
          <div id="course-tabs" class="course-tabs"></div>
        </section>
      </aside>
      <section class="main">
        <div id="dashboard-message" class="status-bar hidden"></div>
        <div id="course-head"></div>
        <section class="calendar-shell" id="calendar-shell"></section>
        <section class="card">
          <div class="card-header"><div><h3>모집중인 행사</h3></div></div>
          <div class="event-list" id="events-open"></div>
        </section>
        <section class="card">
          <div class="card-header"><div><h3>예정된 행사</h3></div></div>
          <div class="event-list" id="events-upcoming"></div>
        </section>
        <section class="card">
          <div class="card-header"><div><h3>마감된 행사</h3></div></div>
          <div class="event-list" id="events-closed"></div>
        </section>
        <section class="card">
          <div class="card-header"><div><h3>과제</h3></div></div>
          <div class="assignment-list" id="assignments-wrap"></div>
        </section>
      </section>
    </div>
  </main>

  <div class="modal" id="event-modal" hidden>
    <div class="modal-card">
      <div class="card-header">
        <div><h3 id="event-modal-title">행사 신청</h3></div>
        <button class="btn btn-secondary small" id="modal-close" type="button">닫기</button>
      </div>
      <div id="event-modal-message" class="status-bar hidden"></div>
      <form id="event-apply-form" class="stack">
        <div id="event-modal-body" class="stack"></div>
        <button class="btn btn-primary" type="submit">신청하기</button>
      </form>
    </div>
  </div>

  <div class="modal" id="support-modal" hidden>
    <div class="modal-card">
      <div class="card-header">
        <div><h3 id="support-modal-title">문의하기</h3><p class="muted" id="support-modal-subtitle"></p></div>
        <button class="btn btn-secondary small" id="support-modal-close" type="button">닫기</button>
      </div>
      <div id="support-modal-body" class="stack"></div>
    </div>
  </div>

  <div class="modal" id="calendar-detail-modal" hidden>
    <div class="modal-card">
      <div class="card-header">
        <div><h3 id="calendar-detail-title">일정 상세</h3><p class="muted" id="calendar-detail-subtitle"></p></div>
        <button class="btn btn-secondary small" id="calendar-detail-close" type="button">닫기</button>
      </div>
      <div id="calendar-detail-body" class="stack"></div>
    </div>
  </div>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
