
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>귤귤 | 토큰 회원가입</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <header id="siteHeader" class="site-header"></header>
  <main>
    <section class="page-hero">
      <div class="container auth-shell">
        <div>
          <span class="eyebrow">TOKEN SIGN-UP</span>
          <h1 class="hero-title" style="font-size:clamp(28px,3.8vw,48px)">강사·기수별 회원가입 링크를<br>토큰 기준으로 따로 운영</h1>
          <p class="hero-copy">강의별 토큰을 발급해 서로 다른 회원가입 페이지처럼 쓸 수 있게 만든 구조입니다. 실제로는 같은 <code>signup.html</code> 이지만 토큰이 강의를 결정합니다.</p>
          <div id="tokenSummary" class="stack" style="margin-top:18px"></div>
        </div>
        <div class="auth-card">
          <div class="row" style="justify-content:space-between">
            <span class="pill orange" id="modeBadge">모드 확인 중</span>
            <a class="btn btn-secondary small" href="./index.html">로그인으로 이동</a>
          </div>
          <form id="signupForm" class="stack" style="margin-top:14px">
            <div class="field"><label>토큰</label><input id="token" class="input" placeholder="예: SHOPPING-ALPHA-2026" /></div>
            <div class="field"><label>이름</label><input id="fullName" class="input" placeholder="홍길동" /></div>
            <div class="field"><label>연락처</label><input id="phone" class="input" placeholder="010-0000-0000" /></div>
            <div class="field"><label>이메일</label><input id="email" class="input" type="email" placeholder="you@example.com" /></div>
            <div class="field"><label>비밀번호</label><input id="password" class="input" type="password" placeholder="8자 이상" /></div>
            <button class="btn btn-primary" type="submit">회원가입</button>
          </form>
        </div>
      </div>
    </section>
    <section class="section"><div class="container"><div id="statusBar" class="status-bar">토큰을 확인하는 중입니다.</div></div></section>
  </main>
  <footer id="siteFooter"></footer>
  <script type="module" src="./assets/js/pages/signup-page.js"></script>
</body>
</html>
