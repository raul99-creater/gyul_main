<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>귤귤 일정관리</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-center-wrap">
    <section class="auth-panel auth-panel-compact">
      <a class="brand brand-center" href="index.html"><span class="brand-mark"></span><span class="brand-text" data-site-name>귤귤 일정관리</span></a>
      <div class="auth-heading">
        <h1 class="auth-title">로그인</h1>
      </div>
      <div id="login-message" class="status-bar hidden"></div>
      <form id="login-form" class="stack auth-form-tight">
        <div class="field">
          <label>이름</label>
          <input class="input" name="full_name" autocomplete="name" />
        </div>
        <div class="field">
          <label>연락처</label>
          <input class="input" name="phone" inputmode="numeric" />
        </div>
        <button class="btn btn-primary btn-block" type="submit">로그인</button>
        <button class="btn btn-secondary btn-block" id="go-signup" type="button">회원가입</button>
      </form>
    </section>
  </main>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
