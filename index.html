<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>귤귤 일정관리</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html"><span class="brand-mark"></span><span class="brand-text" data-site-name>귤귤 일정관리</span></a>
    </div>
  </header>

  <main class="section auth-page">
    <div class="container auth-container">
      <section class="auth-stack-card">
        <div class="auth-stack-header">
          <h1 class="auth-title">회원 로그인</h1>
          <p class="auth-subtitle">이름과 전화번호를 입력해주세요.</p>
        </div>
        <div id="login-message" class="status-bar hidden"></div>
        <form id="login-form" class="stack auth-form">
          <div class="field">
            <label>이름</label>
            <input class="input" name="full_name" autocomplete="name" />
          </div>
          <div class="field">
            <label>전화번호</label>
            <input class="input" name="phone" inputmode="numeric" autocomplete="tel" />
          </div>
          <button class="btn btn-primary auth-submit" type="submit">로그인</button>
          <div class="auth-actions-grid single">
            <button class="btn btn-secondary auth-alt" id="go-signup" type="button">회원가입</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
