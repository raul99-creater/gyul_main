<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>귤귤 일정관리</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <header id="siteHeader" class="site-header"></header>
  <main>
    <section class="page-hero">
      <div class="container hero-grid">
        <div>
          <h1 class="hero-title">귤귤 일정관리</h1>
        </div>
        <div class="hero-shell">
          <h3 style="margin:0 0 12px;font-size:20px">로그인</h3>
          <form id="loginForm" class="stack">
            <div class="field"><label>이메일</label><input id="email" class="input" type="email" /></div>
            <div class="field"><label>비밀번호</label><input id="password" class="input" type="password" /></div>
            <button class="btn btn-primary" type="submit">로그인</button>
          </form>
          <div id="goDashboardWrap" class="row hidden" style="margin-top:12px">
            <a class="btn btn-secondary" href="./dashboard.html">내 일정</a>
            <button class="btn btn-ghost" data-action="logout" type="button">로그아웃</button>
          </div>
        </div>
      </div>
    </section>
    <section class="section"><div class="container"><div id="statusBar" class="status-bar">로그인 전</div></div></section>
  </main>
  <footer id="siteFooter"></footer>
  <script type="module" src="./assets/js/pages/login-page.js"></script>
</body>
</html>
