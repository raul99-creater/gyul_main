<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>귤귤 일정관리</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html"><span class="brand-mark"></span><span class="brand-text" data-site-name>귤귤 일정관리</span></a>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <section class="auth-shell">
        <div class="stack" style="justify-content:center">
          <span class="pill orange">LOGIN</span>
          <h1 class="hero-title">귤귤 일정관리</h1>
        </div>
        <div class="auth-card">
          <div id="login-message" class="status-bar hidden"></div>
          <form id="login-form" class="stack">
            <div class="field">
              <label>이름</label>
              <input class="input" name="full_name" autocomplete="name" />
            </div>
            <div class="field">
              <label>연락처</label>
              <input class="input" name="phone" inputmode="numeric" />
            </div>
            <button class="btn btn-primary" type="submit">로그인</button>
            <button class="btn btn-secondary" id="go-signup" type="button">회원가입</button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
